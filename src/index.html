        @layer base { 
            html { font-family: 'Plus Jakarta Sans', sans-serif; }

        }
    </style>
    <style>
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-subtle { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bubblePop {
            0% { opacity: 0; transform: scale(0.9) translateX(-10px); }
            60% { transform: scale(1.05) translateX(0); opacity: 1; }
            100% { opacity: 1; transform: scale(1) translateX(0); }
        }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }
        
        .animate-fade-up { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fade-up-delayed { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .animate-pulse-subtle { animation: pulse-subtle 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .animate-slide-up-fade { animation: slideUpFade 0.4s ease-out forwards; }
        .animate-bubble-pop { animation: bubblePop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .animate-fade-out { animation: fadeOut 0.5s ease-out forwards; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        
        .transition-layout {
            transition-property: width, opacity, margin, padding, max-height;
            transition-duration: 350ms;
            transition-timing-function: cubic-bezier(0.2, 0.8, 0.2, 1);
        }
    </style>
</head>

        // --- ERROR BOUNDARY ---
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null, errorInfo: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true }; }
            componentDidCatch(error, errorInfo) {
                console.error("UI Crash Terdeteksi:", error, errorInfo);
                this.setState({ error, errorInfo });
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex items-center justify-center h-screen w-full bg-slate-100 p-6">
                            <div className="bg-white p-8 rounded-2xl shadow-xl max-w-2xl w-full border border-rose-200">
                                <div className="text-rose-500 mb-4">
                                    <svg className="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77-1.333.192 3 1.732 3z" /></svg>
                                </div>
                                <h1 className="text-2xl font-bold text-slate-800 mb-2">Terjadi Kesalahan Sistem</h1>
                                <p className="text-slate-600 mb-4">Maaf, terjadi kesalahan saat memuat tampilan (UI Crash). Silakan muat ulang halaman.</p>
                                <div className="bg-slate-900 text-emerald-400 p-4 rounded-lg overflow-auto max-h-64 text-xs font-mono mb-4 whitespace-pre-wrap">
                                    {this.state.error && this.state.error.toString()}
                                    <br/>
                                    {this.state.errorInfo && this.state.errorInfo.componentStack}
                                </div>
                                <button onClick={() => window.location.reload()} className="bg-rose-600 hover:bg-rose-700 text-white font-bold py-2 px-6 rounded-xl transition-colors">
                                    Muat Ulang Halaman
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children; 
            }

            useEffect(() => {
                const isEmptyVal = v => !v || ['-', 'N/A', '', 'n/a'].includes(v.toString().trim());

                        s2Empty = false;

                    return { action: s1Action, online: s2Online, isEmpty: s1Empty && s2Empty };
                };

                const fetchStats = () => {
                    if (typeof google === 'undefined' || !google.script) {
                        setTimeout(() => {

                    if (email) setUserEmail(email); 
                    if (perms) setUserPermissions(perms);

                const fetchNotifications = () => {
                    if (typeof google === 'undefined' || !google.script) return;

                        google.script.run

                                        if (notif.permitIndex && typeof window.PERMIT_BUTTONS !== 'undefined') {
                                            const btnConfig = window.PERMIT_BUTTONS[notif.permitIndex - 1];
                                            if (btnConfig) {
                                                let actLink = null, actTitle = '';
                                                if (notif.id.startsWith('CLS-')) { actLink = btnConfig.attachmentLink; actTitle = `Close Permit PERMIT-${notif.permitIndex}`; } 
                                                else if (notif.id.startsWith('ENG-')) { actLink = btnConfig.engineerLink; actTitle = `Engineer Approval PERMIT-${notif.permitIndex}`; } 
                                                else if (notif.id.startsWith('JO-')) { actLink = btnConfig.requestLink; actTitle = `Approval Job Owner PERMIT-${notif.permitIndex}`; }
                                                if (actLink) return { ...notif, actionLink: actLink, actionTitle: actTitle };
                                            }
                                        }
                                        return notif;
                                    });
                                    setNotifications(enrichedData);
                                }
                            }).getUserNotifications();
                    }
                };

                fetchNotifications();
                const notifInterval = setInterval(fetchNotifications, 120000);
                return () => clearInterval(notifInterval);

                        const rule = userPermissions[app.id];
                        if (rule === '*') return app;
                        if (Array.isArray(rule) && app.details) return { ...app, details: app.details.filter(d => rule.includes(d.id)) };
                        return { ...app, details: [] };
                    });
                }
                const dashboardApp = { id: 'home', name: 'Dashboard', description: { id: 'Menu utama sistem.', en: 'Main system dashboard.' }, iconStr: 'home', component: 'SystemDashboard' };
                if (!filteredApps.find(a => a.id === 'home')) filteredApps.unshift(dashboardApp);
                return filteredApps;
            }, [userPermissions, isCheckingAuth, apps]);

            const allUrlsToLoad = useMemo(() => {
                const urls = new Set();
                visibleApps.forEach(app => {
                    if (app.iframeUrl && app.iframeUrl !== '#') urls.add(app.iframeUrl);
                    if (app.details) {
                        app.details.forEach(d => {
                            if (d.link && d.link !== '#' && !d.link.includes('page=map')) urls.add(d.link);
                        });
                    }
                });
                return Array.from(urls);
            }, [visibleApps]);

            const totalUrls = allUrlsToLoad.length;
            const loadedUrlsCount = loadedUrls.length;
            const progressRatio = totalUrls > 0 ? Math.round((loadedUrlsCount / totalUrls) * 100) : 100;

            useEffect(() => { if (isLoggedIn && !activeAppId && visibleApps.length > 0) setActiveAppId(visibleApps[0].id); }, [isLoggedIn, visibleApps]);
            useEffect(() => { setMenuOpen(false); }, [activeAppId]); 

            useEffect(() => {
                if (isPreloading) {
                    const timer = setTimeout(() => { setIsPreloading(false); }, 10000); 
                    return () => clearTimeout(timer);
                }
            }, [isPreloading]);

            useEffect(() => {
                if (isPreloading && totalUrls > 0 && loadedUrlsCount >= totalUrls) {
                    setTimeout(() => setIsPreloading(false), 500); 
                }
            }, [loadedUrlsCount, totalUrls, isPreloading]);

            const handleLoginAttempt = () => {
                setIsLoggedIn(true);
                setIsPreloading(true);
            };

            const handleIframeLoaded = useCallback((url) => {
                setLoadedUrls(prev => prev.includes(url) ? prev : [...prev, url]);
            }, []);

            const activeApp = visibleApps.find(app => app.id === activeAppId);
            
            const activeUrl = useMemo(() => {
                if (!activeApp || activeApp.id === 'home' || activeApp.component) return null;
                if (activeSubItemId) {
                    const sub = activeApp.details?.find(d => d.id === activeSubItemId);
                    return sub && sub.link !== '#' ? sub.link : null;
                }
                return activeApp.details?.length > 0 ? null : (activeApp.iframeUrl !== '#' ? activeApp.iframeUrl : null);
            }, [activeApp, activeSubItemId]);

            const permissionStatus = (userPermissions === 'ALL' || Object.keys(userPermissions).length > 0) ? 'granted' : 'denied';
            const isAdmin = userPermissions === 'ALL';

            const handleSelectApp = useCallback((appId, subItemId = null) => { setActiveAppId(appId); setActiveSubItemId(subItemId); setMenuOpen(false); }, []);
            const handleUpdateDetails = useCallback((appId, newDetails) => { setApps(prev => prev.map(a => a.id === appId ? { ...a, details: newDetails } : a)); }, []);
            const handleAddApp = useCallback(() => { const id = prompt("App ID (Tanpa spasi):"); const name = prompt("Nama Menu:"); if (id && name) setApps(prev => [...prev, { id, name, description: {en: 'New App', id: 'Baru'}, iconStr: 'document-text', details: [] }]); }, []);
            const handleSaveConfig = useCallback(() => { 
                setIsSaving(true); 
                const cleanData = apps.filter(a => a.id !== 'home').map(({icon, ...rest}) => rest); 
                if(typeof google !== 'undefined' && google.script) {
                    google.script.run.withSuccessHandler((res) => { setIsSaving(false); alert(res.message); if(res.success) setIsEditMode(false); }).withFailureHandler((err) => { setIsSaving(false); alert("Error: " + err); }).saveAppConfig(cleanData); 
                } else {
                    setTimeout(() => { setIsSaving(false); alert("Data konfigurasi berhasil disimulasikan sebagai tersimpan."); setIsEditMode(false); }, 1000);
                }
            }, [apps]);

            if (!isLoggedIn) return <LoginPage onLogin={handleLoginAttempt} userEmail={userEmail} isLoading={isCheckingAuth} permissionStatus={permissionStatus} allApps={visibleApps} />;

            const isHomeActive = activeApp?.id === 'home';
            const isDSCEActive = activeApp?.component === 'DSCEDashboard';
            const isUnifiedActive = !isHomeActive && !isDSCEActive;

            return (
                <>
                    {isPreloading && (
                        <SplashScreen 
                            progress={progressRatio} 
                            total={totalUrls} 
                            loaded={loadedUrlsCount} 
                            onSkip={() => setIsPreloading(false)} 
                        />
                    )}

                    <div className="h-full w-full flex bg-[#F8FAFC] overflow-hidden font-sans relative">
                        <Sidebar 
                            apps={visibleApps} 
                            activeAppId={activeAppId} 
                            onSelectApp={handleSelectApp} 
                            isEditMode={isEditMode} 
                            setIsEditMode={setIsEditMode}
                            onMoveApp={(idx, dir) => { if (idx + dir < 0 || idx + dir >= apps.length) return; const newApps = [...apps]; [newApps[idx], newApps[idx + dir]] = [newApps[idx + dir], newApps[idx]]; setApps(newApps); }}
                            onDeleteApp={(id) => { if(confirm("Hapus modul utama ini?")) setApps(apps.filter(a => a.id !== id)); }}
                            onAddApp={handleAddApp} language={language} setLanguage={setLanguage}
                            onLogout={() => setIsLoggedIn(false)} isAdmin={isAdmin} isSaving={isSaving} handleSaveConfig={handleSaveConfig}
                            setMenuOpen={setMenuOpen} notifications={notifications} setIsNotificationOpen={setIsNotificationOpen}
                        />

                        <NotificationPanel 
                            isOpen={isNotificationOpen} onClose={() => setIsNotificationOpen(false)} notifications={notifications}
                            markAsRead={(id) => setNotifications(prev => prev.map(n => n.id === id ? { ...n, isRead: true } : n))} onSelectApp={handleSelectApp} onOpenForm={openFormModal}
                        />
                        
                        <main className="flex-1 flex flex-col h-full relative overflow-hidden">
                            
                            {/* Layer 1: Home Dashboard */}
                            <div className={`absolute inset-0 transition-opacity duration-300 w-full h-full p-6 md:p-8 lg:p-10 overflow-y-auto hide-scrollbar ${isHomeActive ? 'z-20 opacity-100 pointer-events-auto' : 'z-0 opacity-0 pointer-events-none'}`}>
                                {isHomeActive && <SystemDashboard allApps={visibleApps} onSelectApp={handleSelectApp} userEmail={userEmail} language={language} />}
                            </div>

                            {/* Layer 2: DSCE Dashboard */}
                            <div className={`absolute inset-0 transition-opacity duration-300 w-full h-full p-4 md:p-6 lg:p-8 ${isDSCEActive ? 'z-20 opacity-100 pointer-events-auto' : 'z-0 opacity-0 pointer-events-none'}`}>
                                {isDSCEActive && <DSCEDashboard language={language} />}
                            </div>

                            {/* Layer 3: Unified Dashboard (IFRAMES) */}
                            <div className={`absolute inset-0 transition-opacity duration-300 w-full h-full ${isUnifiedActive ? 'z-20 opacity-100 pointer-events-auto' : 'z-0 opacity-0 pointer-events-none'}`}>
                                <UnifiedDashboard 
                                    language={language} 
                                    displayApp={activeApp?.id === 'home' ? visibleApps[1] : activeApp}
                                    isUnified={isUnifiedActive}
                                    allUrls={allUrlsToLoad}
                                    loadedUrls={loadedUrls}
                                    onIframeLoad={handleIframeLoaded}
                                    activeUrl={activeUrl}
                                    onSelectApp={handleSelectApp}
                                    activeSubItemId={activeSubItemId}
                                    isMenuOpen={isMenuOpen}
                                    setMenuOpen={setMenuOpen}
                                    isEditMode={isEditMode}
                                    onUpdateDetails={(d) => activeApp && handleUpdateDetails(activeApp.id, d)}
                                />
                            </div>

                        </main>

                        <FormModal isOpen={formModalState.isOpen} onClose={closeFormModal} data={formModalState} />
                        <HelpDeskModal isOpen={isHelpOpen} onClose={() => setIsHelpOpen(false)} userEmail={userEmail} />

                        {/* Tombol Bantuan & Back to Home */}
                        <div className="fixed bottom-8 right-8 flex flex-col items-center space-y-4 z-[60]">
                            <button
                                onClick={() => setIsHelpOpen(true)}
                                className="p-3.5 rounded-full bg-rose-500 text-white backdrop-blur-md border border-rose-300/30 shadow-xl shadow-rose-500/20 hover:bg-rose-600 hover:shadow-rose-600/40 hover:scale-110 opacity-60 hover:opacity-100 transition-all duration-300 flex items-center justify-center group"
                                title="Lapor Kendala / IT Help Desk"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 transition-transform group-hover:rotate-12" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                                    <path strokeLinecap="round" strokeLinejoin="round" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z" />
                                </svg>
                            </button>

                            {!isHomeActive && (
                                <button
                                    onClick={() => handleSelectApp('home')}
                                    className="p-4 rounded-full bg-indigo-600 text-white backdrop-blur-md border border-indigo-300/30 shadow-xl shadow-indigo-500/20 hover:bg-indigo-700 hover:shadow-indigo-600/40 hover:scale-110 opacity-60 hover:opacity-100 transition-all duration-300 flex items-center justify-center group animate-fade-up"
                                    title="Kembali ke Dashboard Utama"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-7 w-7 transition-transform group-hover:-translate-y-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                                        <path strokeLinecap="round" strokeLinejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                                    </svg>
                                </button>
                            )}
                        </div>
                    </div>
                </>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
