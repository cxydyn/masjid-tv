<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Sholat Digital - Masjid TV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Mencegah scroll agar pas di TV */
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #000;
            transition: background-color 0.5s ease;
        }
        .main-container {
            color: white;
            padding: 1rem;
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            transition: background 0.5s ease;
        }

        /* Tema Siang */
        .main-container.day-theme {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        }
        .day-theme .glass-box {
            background-color: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .day-theme .main-clock-box {
            background-color: white;
            color: #1e3a8a;
        }

        /* Tema Malam */
        .main-container.dark-theme {
            background: linear-gradient(135deg, #111827, #000000);
        }
        .dark-theme .glass-box {
            background-color: rgba(31, 41, 55, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .dark-theme .main-clock-box {
            background-color: #1f2937;
            color: white;
        }

        .glass-box {
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* GRID SYSTEM: Responsive Landscape/Portrait */
        .content-grid {
            display: grid;
            grid-template-columns: 1.8fr 1fr; 
            gap: 1rem;
            flex-grow: 1;
            min-height: 0;
        }

        @media (orientation: portrait) {
            .content-grid {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1.5fr;
            }
            .time { font-size: 15vw !important; }
            .countdown-time { font-size: 8vw !important; }
        }

        .right-panel {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 16px;
            overflow: hidden;
            background-color: #000;
        }
        .right-panel iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .main-clock-box {
            padding: 1.2rem;
            text-align: center;
            border-radius: 16px;
        }
        .time {
            font-size: 5.5vw;
            font-weight: 800;
            line-height: 1;
        }
        .countdown-time {
            font-size: 3vw;
            font-weight: 700;
            color: #fbbf24;
        }

        #prayer-times-container {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            height: 100%;
        }

        .prayer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.4rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .prayer-item:last-child { border: 0; }
        
        #prayer-lock-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #000, #111);
            z-index: 1000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        input, textarea { color: #000 !important; }
    </style>
</head>
<body class="day-theme">

    <div id="main-container" class="main-container day-theme">
        <!-- HEADER -->
        <div class="flex justify-between items-center mb-4 border-b border-white/20 pb-2">
            <div>
                <h2 id="mosque-name-display" class="text-2xl font-black uppercase tracking-tight">Masjid Ar-Rahim</h2>
                <p id="location-display" class="text-sm opacity-70 italic">Mencari lokasi...</p>
            </div>
            <div class="text-right flex items-center gap-4">
                <div>
                    <h2 id="date-gregorian" class="text-lg font-bold">...</h2>
                    <p id="date-hijri" class="text-sm opacity-80">...</p>
                </div>
                <button id="settings-btn" class="p-2 bg-white/10 rounded-full hover:bg-white/20">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="content-grid">
            <div class="right-panel shadow-2xl">
                <iframe id="live-stream" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                <div id="adhan-warning" class="absolute inset-0 bg-amber-500 text-blue-900 hidden flex-col items-center justify-center p-4 text-center z-50">
                    <h1 class="text-6xl font-black uppercase mb-4">Waktu Sholat Tiba</h1>
                    <p id="warning-name" class="text-4xl font-bold uppercase"></p>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <div class="main-clock-box shadow-xl">
                    <div id="main-clock" class="time">00:00</div>
                    <p class="text-lg opacity-60 uppercase font-bold tracking-widest mt-2">Waktu Sekarang</p>
                </div>

                <div class="glass-box p-4 text-center">
                    <p id="next-prayer-name" class="font-bold text-amber-300 uppercase italic">Menghitung...</p>
                    <div id="countdown-time" class="countdown-time">-00:00:00</div>
                </div>

                <div class="glass-box flex-grow overflow-hidden flex flex-col">
                    <div id="prayer-times-container" class="flex-grow">
                        <!-- Jadwal Injected Here -->
                    </div>
                    <!-- Ayat Section -->
                    <div class="p-4 border-t border-white/10 text-center bg-black/10">
                         <p id="ayat-text" class="text-right text-xl mb-2 font-serif" dir="rtl"></p>
                         <p id="ayat-translation" class="text-xs italic opacity-80"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Running Text -->
        <div class="mt-4 bg-black/30 p-2 rounded-xl glass-box overflow-hidden">
            <marquee id="marquee-display" class="text-2xl font-medium tracking-wide">Luruskan dan rapatkan shaf sholat.</marquee>
        </div>
    </div>

    <!-- PRAYER LOCK OVERLAY -->
    <div id="prayer-lock-overlay">
        <h1 class="text-5xl font-black text-amber-500 mb-8 uppercase tracking-widest">Waktunya Berjamaah</h1>
        <div id="lock-clock" class="text-9xl font-black text-white">00:00</div>
        <p class="text-2xl opacity-60 mt-8 italic">"Harap matikan suara HP Anda"</p>
    </div>

    <!-- SETTINGS MODAL -->
    <div id="settings-modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-[2000] p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md text-slate-900 shadow-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="text-2xl font-black mb-6 uppercase">Pengaturan Masjid</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase opacity-50 mb-1">Nama Masjid</label>
                    <input type="text" id="input-mosque" class="w-full p-4 bg-slate-100 rounded-xl border-0 font-bold">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase opacity-50 mb-1">YouTube Video ID</label>
                    <input type="text" id="input-yt" class="w-full p-4 bg-slate-100 rounded-xl border-0 font-mono" placeholder="7pA7vU3JTAw">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase opacity-50 mb-1">Running Text (Pesan)</label>
                    <textarea id="input-marquee" class="w-full p-4 bg-slate-100 rounded-xl border-0 h-24"></textarea>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase opacity-50 mb-1">Tema Tampilan</label>
                    <div class="grid grid-cols-2 gap-2 mt-1">
                        <label class="flex items-center p-3 rounded-xl border border-slate-200 cursor-pointer">
                            <input type="radio" name="theme" value="auto" checked> <span class="ml-2 font-bold">Auto</span>
                        </label>
                        <label class="flex items-center p-3 rounded-xl border border-slate-200 cursor-pointer">
                            <input type="radio" name="theme" value="dark"> <span class="ml-2 font-bold">Dark</span>
                        </label>
                    </div>
                </div>
                <div class="flex gap-4 pt-4">
                    <button id="save-btn" class="flex-grow bg-blue-600 text-white font-black py-4 rounded-2xl tracking-widest">SIMPAN</button>
                    <button id="close-btn" class="bg-slate-200 px-6 rounded-2xl font-bold">BATAL</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- DATA & CONFIG ---
        let appSettings = {
            mosqueName: "Masjid Ar-Rahim",
            ytId: "7pA7vU3JTAw", // Rodja TV Default
            marquee: "Selamat datang di Masjid Kami. Harap matikan suara ponsel Anda saat berada di dalam ruang sholat. Luruskan dan rapatkan barisan shaf.",
            theme: "auto",
            city: "Jakarta"
        };

        const prayerNames = ["Imsak", "Fajr", "Sunrise", "Dhuhr", "Asr", "Maghrib", "Isha"];
        const prayerIndo = { Imsak:"Imsak", Fajr:"Subuh", Sunrise:"Terbit", Dhuhr:"Dzuhur", Asr:"Ashar", Maghrib:"Maghrib", Isha:"Isya" };
        let prayerData = {};

        // --- CORE FUNCTIONS ---

        function init() {
            const saved = localStorage.getItem('masjid_tv_settings');
            if (saved) appSettings = JSON.parse(saved);
            
            applyUI();
            updateClock();
            setInterval(updateClock, 1000);
            
            handleLocation(); // Ambil Lokasi & Jadwal
            fetchRandomAyat();
            setInterval(fetchRandomAyat, 600000); // Ganti ayat tiap 10 menit
        }

        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('main-clock').textContent = timeStr;
            document.getElementById('lock-clock').textContent = timeStr;
            checkLogic(now);
        }

        function applyUI() {
            document.getElementById('mosque-name-display').textContent = appSettings.mosqueName;
            document.getElementById('marquee-display').textContent = appSettings.marquee;
            
            // Perbaikan URL YouTube agar kompatibel dengan TV (menghindari error 153)
            const frame = document.getElementById('live-stream');
            const newSrc = `https://www.youtube.com/embed/${appSettings.ytId}?autoplay=1&mute=1&loop=1&playlist=${appSettings.ytId}&controls=0&rel=0&enablejsapi=1&origin=https://www.youtube.com`;
            if (frame.src !== newSrc) frame.src = newSrc;

            if (appSettings.theme === 'dark') {
                document.getElementById('main-container').classList.replace('day-theme', 'dark-theme');
            } else {
                document.getElementById('main-container').classList.replace('dark-theme', 'day-theme');
            }
        }

        function checkLogic(now) {
            if (!prayerData.Fajr) return;
            const prayers = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
            let next = null;
            let target = null;

            for (let p of prayers) {
                const [h, m] = prayerData[p].split(':');
                const pDate = new Date(now); pDate.setHours(h, m, 0);
                if (pDate > now) { next = p; target = pDate; break; }
            }

            if (next) {
                const diff = target - now;
                const hh = Math.floor(diff / 3600000);
                const mm = Math.floor((diff % 3600000) / 60000);
                const ss = Math.floor((diff % 60000) / 1000);
                
                document.getElementById('next-prayer-name').textContent = `Menuju ${prayerIndo[next]}`;
                document.getElementById('countdown-time').textContent = `-${hh.toString().padStart(2,'0')}:${mm.toString().padStart(2,'0')}:${ss.toString().padStart(2,'0')}`;
                
                // Alert 2 menit sebelum
                document.getElementById('adhan-warning').style.display = (diff < 120000) ? 'flex' : 'none';
                document.getElementById('warning-name').textContent = prayerIndo[next];

                // Kunci Layar saat waktu tiba
                if (now.getHours() == target.getHours() && now.getMinutes() == target.getMinutes() && now.getSeconds() == 0) {
                    toggleLock(true);
                }
            }
        }

        function toggleLock(show) {
            document.getElementById('prayer-lock-overlay').style.display = show ? 'flex' : 'none';
            if (show) setTimeout(() => toggleLock(false), 600000); // Lepas kunci setelah 10 menit
        }

        async function fetchPrayers(lat, lon) {
            const url = `https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=11`;
            try {
                const res = await fetch(url);
                const json = await res.json();
                prayerData = json.data.timings;
                
                document.getElementById('location-display').textContent = json.data.meta.timezone.replace("_", " ");
                document.getElementById('date-gregorian').textContent = json.data.date.readable;
                document.getElementById('date-hijri').textContent = json.data.date.hijri.day + " " + json.data.date.hijri.month.en + " " + json.data.date.hijri.year;

                const container = document.getElementById('prayer-times-container');
                container.innerHTML = '';
                prayerNames.forEach(p => {
                    container.innerHTML += `
                        <div class="prayer-item">
                            <span class="font-bold opacity-70 uppercase text-xs">${prayerIndo[p]}</span>
                            <span class="text-2xl font-black">${prayerData[p]}</span>
                        </div>`;
                });
            } catch (e) { console.error("API Error", e); }
        }

        function handleLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (p) => fetchPrayers(p.coords.latitude, p.coords.longitude),
                    () => fetchPrayers(-6.2088, 106.8456) // Fallback Jakarta
                );
            } else { fetchPrayers(-6.2088, 106.8456); }
        }

        async function fetchRandomAyat() {
            try {
                const res = await fetch('https://quran-api.santrikoding.com/api/random');
                const data = await res.json();
                document.getElementById('ayat-text').textContent = data.ar;
                document.getElementById('ayat-translation').textContent = `"${data.idn}" - ${data.surah.nama_latin}:${data.nomor}`;
            } catch (e) { console.error(e); }
        }

        // --- UI EVENTS ---

        document.getElementById('settings-btn').onclick = () => {
            document.getElementById('input-mosque').value = appSettings.mosqueName;
            document.getElementById('input-yt').value = appSettings.ytId;
            document.getElementById('input-marquee').value = appSettings.marquee;
            document.getElementById('settings-modal').style.display = 'flex';
        };

        document.getElementById('close-btn').onclick = () => {
            document.getElementById('settings-modal').style.display = 'none';
        };

        document.getElementById('save-btn').onclick = () => {
            appSettings.mosqueName = document.getElementById('input-mosque').value;
            appSettings.ytId = document.getElementById('input-yt').value;
            appSettings.marquee = document.getElementById('input-marquee').value;
            appSettings.theme = document.querySelector('input[name="theme"]:checked').value;
            
            localStorage.setItem('masjid_tv_settings', JSON.stringify(appSettings));
            applyUI();
            document.getElementById('settings-modal').style.display = 'none';
        };

        window.onload = init;
    </script>
</body>
</html>
