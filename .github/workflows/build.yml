name: Build Tauri Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      # Perintah ini akan menghilangkan warning/peringatan kuning dari GitHub
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Install NDK (Versi terbaru 26)
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;26.1.10909125"
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install Frontend Dependencies
        run: |
          if [ ! -f "package.json" ]; then npm init -y && npm install -D @tauri-apps/cli; fi
          npm install

      - name: Fix Tauri Identifier (Anti-Crash)
        run: sed -i 's/"com.tauri.dev"/"com.masjid.tv"/g' src-tauri/tauri.conf.json || true

      - name: Init Tauri Android
        run: npx tauri android init
        continue-on-error: true 

      - name: Build APK Android
        run: npx tauri android build --apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Jadwal-Sholat
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk