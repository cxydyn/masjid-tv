name: Build Android APK

# Akan berjalan otomatis setiap kali Anda menyimpan (push) kode ke GitHub
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      # SCRIPT PENTING BARU: Menghapus NDK 29 yang bermasalah dan memaksa NDK 26
      - name: Force NDK 26
        run: |
          echo "Menghapus NDK bawaan ubuntu-latest yang sering menyebabkan error..."
          sudo rm -rf $ANDROID_HOME/ndk/*
          echo "Menginstal NDK 26 yang stabil..."
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;26.1.10909125"
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install NPM Packages
        run: npm install

      # Memperbaiki Bundle Identifier bawaan Tauri
      - name: Fix Tauri Identifier
        run: |
          if [ -f "src-tauri/tauri.conf.json" ]; then
            sed -i 's/"com.tauri.dev"/"com.keluarga.tv"/g' src-tauri/tauri.conf.json
            echo "✅ Bundle Identifier berhasil diubah ke com.keluarga.tv"
          else
            echo "⚠️ tauri.conf.json tidak ditemukan."
          fi

      # Menyiapkan folder Android sebelum di-build
      - name: Init Android Project
        run: npx tauri android init || true

      # Menambahkan dummy script 'build' agar Tauri tidak error
      - name: Setup Dummy Build Script
        run: |
          npm pkg set scripts.build="echo 'No build required for pure HTML'"
          echo "✅ Dummy build script berhasil ditambahkan!"

      # Menyuntikkan izin Android TV (Leanback & Non-Touchscreen)
      - name: Patch AndroidManifest untuk Smart TV
        run: |
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            # Tambahkan LEANBACK_LAUNCHER agar ikon muncul di menu TV
            perl -pi -e 's|(<category android:name="android\.intent\.category\.LAUNCHER"\s*/>)|$1\n                <category android:name="android.intent.category.LEANBACK_LAUNCHER" />|' $MANIFEST
            
            # Beri tahu TV bahwa aplikasi ini TIDAK butuh Layar Sentuh & GPS
            perl -pi -e 's|(<application)|\n    <uses-feature android:name="android.hardware.touchscreen" android:required="false" />\n    <uses-feature android:name="android.software.leanback" android:required="false" />\n    <uses-feature android:name="android.hardware.location" android:required="false" />\n    $1|' $MANIFEST
            
            echo "✅ AndroidManifest berhasil ditambal untuk Android TV!"
          else
            echo "⚠️ AndroidManifest tidak ditemukan."
          fi

      # Merakit aplikasi Android (APK) di mode DEBUG agar otomatis "Signed"
      - name: Build APK (Tauri) Debug Mode
        run: npx tauri android build --apk --debug

      # Menyerahkan hasil APK ke GitHub Actions
      - name: Upload APK Hasil
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Jadwal-Sholat-TV
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk