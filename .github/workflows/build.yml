name: Build Tauri Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CI: true 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Install Android SDK & NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125"
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install Frontend Dependencies
        run: npm install

      - name: Fix Tauri Identifier
        run: sed -i 's/"com.tauri.dev"/"com.masjid.tv"/g' src-tauri/tauri.conf.json || true

      - name: Init Tauri Android
        run: npx tauri android init || true

      - name: Patch AndroidManifest untuk Smart TV (Leanback & Fitur)
        run: |
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            # 1. Tambahkan LEANBACK_LAUNCHER agar aplikasi muncul di Menu Utama TV
            perl -pi -e 's|(<category android:name="android\.intent\.category\.LAUNCHER"\s*/>)|$1\n                <category android:name="android.intent.category.LEANBACK_LAUNCHER" />|' $MANIFEST
            
            # 2. Beri tahu OS TV bahwa aplikasi ini TIDAK WAJIB menggunakan Touchscreen dan GPS/Location
            perl -pi -e 's|(<application)|\n    <uses-feature android:name="android.hardware.touchscreen" android:required="false" />\n    <uses-feature android:name="android.software.leanback" android:required="false" />\n    <uses-feature android:name="android.hardware.location" android:required="false" />\n    $1|' $MANIFEST
            
            echo "✅ AndroidManifest berhasil ditambal untuk kompatibilitas Android TV!"
          else
            echo "⚠️ AndroidManifest tidak ditemukan."
          fi

      - name: Set up NPM Scripts
        run: |
          npm pkg set scripts.build="echo 'No build required'"
          npm pkg set scripts.tauri="tauri"

      # MENGUBAH KE MODE DEBUG AGAR OTOMATIS SIGNED DAN BISA DIINSTAL
      - name: Build APK Android (Debug Mode)
        run: npx tauri android build --debug --apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Jadwal-Sholat-Debug
          path: src-tauri/gen/android/app/build/outputs/apk/universal/debug/*.apk